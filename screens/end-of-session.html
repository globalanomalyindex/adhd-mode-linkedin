<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ADHD Mode · Session ended</title>
<style>
  @import url('../design-system/base.css');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Source Sans 3', -apple-system, BlinkMacSystemFont, sans-serif;
    font-feature-settings: 'kern', 'liga';
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
  }

  body {
    display: flex;
    justify-content: center;
    padding: 56px 24px;
  }

  /* ---------- Card entrance ---------- */
  .card {
    width: 100%;
    max-width: 560px;
    background: var(--card);
    border-radius: 8px;
    box-shadow: var(--shadow);
    overflow: hidden;
    opacity: 0;
    transform: translateY(var(--lift-md)) scale(0.96);
    animation: card-in var(--d-slow) var(--ease-out) 100ms forwards;
  }

  @keyframes card-in {
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ---------- Header ---------- */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 24px;
    border-bottom: 1px solid var(--hairline);
    font-size: 13px;
    opacity: 0;
    animation: fade-in var(--d-base) var(--ease-out) 300ms forwards;
  }
  .header .left { display: flex; align-items: center; gap: 8px; color: var(--text-secondary); }
  .header .dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--brand);
    animation: pulse 2.4s var(--ease-in-out) infinite;
  }
  .header .label { color: var(--text); font-weight: 600; }
  .header .time { color: var(--text-tertiary); font-variant-numeric: tabular-nums; }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(10, 102, 194, 0.3); }
    50% { box-shadow: 0 0 0 4px rgba(10, 102, 194, 0); }
  }

  /* ---------- Hero ---------- */
  .hero {
    padding: 40px 32px 28px;
    text-align: center;
  }
  .hero h1 {
    font-size: 32px;
    font-weight: 600;
    letter-spacing: -0.015em;
    line-height: 1.15;
    color: var(--text);
    opacity: 0;
    transform: translateY(var(--lift-sm));
    animation: rise var(--d-slow) var(--ease-out) 360ms forwards;
  }

  /* ---------- Stats ---------- */
  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    border-top: 1px solid var(--hairline);
    border-bottom: 1px solid var(--hairline);
  }
  .stat {
    padding: 22px 12px;
    text-align: center;
    border-right: 1px solid var(--hairline);
    opacity: 0;
    transform: translateY(var(--lift-sm));
  }
  .stat:last-child { border-right: none; }
  .stat:nth-child(1) { animation: rise var(--d-slow) var(--ease-out) 480ms forwards; }
  .stat:nth-child(2) { animation: rise var(--d-slow) var(--ease-out) calc(480ms + var(--stagger-tight)) forwards; }
  .stat:nth-child(3) { animation: rise var(--d-slow) var(--ease-out) calc(480ms + var(--stagger-tight) * 2) forwards; }

  .stat-num {
    font-size: 28px;
    font-weight: 600;
    color: var(--text);
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .stat-label {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 6px;
  }

  /* ---------- Queue ---------- */
  .queue { padding: 24px 24px 8px; }
  .queue-header {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--text-secondary);
    text-transform: uppercase;
    margin-bottom: 4px;
    opacity: 0;
    animation: fade-in var(--d-base) var(--ease-out) 660ms forwards;
  }
  .queue-item {
    display: grid;
    grid-template-columns: 36px 1fr auto;
    gap: 14px;
    padding: 14px 0;
    border-top: 1px solid var(--hairline);
    align-items: center;
    opacity: 0;
    transform: translateY(var(--lift-sm));
    transition: background-color var(--d-fast) var(--ease-in-out);
    margin: 0 -12px;
    padding-left: 12px;
    padding-right: 12px;
    border-radius: 4px;
  }
  .queue-item:first-of-type { border-top: none; margin-top: 8px; }
  .queue-item:hover { background: var(--brand-tint); cursor: pointer; }
  .queue-item:nth-of-type(1) { animation: rise var(--d-slow) var(--ease-out) 720ms forwards; }
  .queue-item:nth-of-type(2) { animation: rise var(--d-slow) var(--ease-out) calc(720ms + var(--stagger-tight)) forwards; }
  .queue-item:nth-of-type(3) { animation: rise var(--d-slow) var(--ease-out) calc(720ms + var(--stagger-tight) * 2) forwards; }

  .queue-emoji {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: #eef3f8;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    transition: transform var(--d-base) var(--ease-spring);
  }
  .queue-item:hover .queue-emoji { transform: scale(1.1); }

  .queue-body { min-width: 0; }
  .queue-author { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.3; }
  .queue-snippet {
    font-size: 13px; color: var(--text-secondary); margin-top: 2px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .queue-when { font-size: 12px; color: var(--text-tertiary); white-space: nowrap; }

  /* ---------- Actions ---------- */
  .actions {
    padding: 20px 24px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    border-top: 1px solid var(--hairline);
    margin-top: 8px;
    opacity: 0;
    animation: fade-in var(--d-slow) var(--ease-out) 900ms forwards;
  }
  .btn-primary {
    background: var(--brand);
    color: #ffffff;
    border: none;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    padding: 10px 24px;
    border-radius: 999px;
    cursor: pointer;
    transition: background var(--d-fast) var(--ease-in-out),
                transform var(--d-fast) var(--ease-out),
                box-shadow var(--d-base) var(--ease-out);
    position: relative;
  }
  .btn-primary:hover {
    background: var(--brand-hover);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(10, 102, 194, 0.25);
  }
  .btn-primary:active {
    transform: translateY(0);
    transition-duration: var(--d-fast);
  }
  .btn-text {
    background: none; border: none; font-family: inherit;
    font-size: 14px; color: var(--brand); font-weight: 600;
    cursor: pointer; padding: 8px 4px;
    position: relative;
    transition: color var(--d-fast) var(--ease-in-out);
  }
  .btn-text::after {
    content: ''; position: absolute; bottom: 4px; left: 4px; right: 4px;
    height: 1px; background: currentColor;
    transform: scaleX(0); transform-origin: left;
    transition: transform var(--d-base) var(--ease-out);
  }
  .btn-text:hover { color: var(--brand-hover); }
  .btn-text:hover::after { transform: scaleX(1); }

  /* ---------- Keyframes ---------- */
  @keyframes fade-in { to { opacity: 1; } }
  @keyframes rise { to { opacity: 1; transform: translateY(0); } }

  /* ---------- Reduced motion fallback ---------- */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-delay: 0ms !important;
      transition-duration: 0.01ms !important;
    }
    .card, .hero h1, .stat, .queue-item, .actions { opacity: 1; transform: none; }
  }

  /* ---------- Mobile ---------- */
  @media (max-width: 480px) {
    body { padding: 0; }
    .card { border-radius: 0; box-shadow: none; min-height: 100vh; }
    .hero { padding: 32px 20px 24px; }
    .hero h1 { font-size: 26px; }
    .stat-num { font-size: 24px; }
    .actions { flex-direction: column; align-items: stretch; }
    .actions .btn-text { text-align: center; }
  }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="left">
      <span class="dot"></span>
      <span class="label">Focus session</span>
      <span style="color: var(--text-tertiary);">·</span>
      <span style="color: var(--text-secondary);">Ended</span>
    </div>
    <div class="time">12:00</div>
  </div>

  <div class="hero">
    <h1>Done.</h1>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-num" data-target="11">0</div>
      <div class="stat-label">Posts seen</div>
    </div>
    <div class="stat">
      <div class="stat-num" data-target="4">0</div>
      <div class="stat-label">Reactions</div>
    </div>
    <div class="stat">
      <div class="stat-num" data-target="3">0</div>
      <div class="stat-label">Will resurface</div>
    </div>
  </div>

  <div class="queue">
    <div class="queue-header">Coming back</div>

    <div class="queue-item">
      <div class="queue-emoji">&#128161;</div>
      <div class="queue-body">
        <div class="queue-author">Maya Chen</div>
        <div class="queue-snippet">Leading through ambiguity</div>
      </div>
      <div class="queue-when">In a few days</div>
    </div>

    <div class="queue-item">
      <div class="queue-emoji">&#129309;</div>
      <div class="queue-body">
        <div class="queue-author">James Park</div>
        <div class="queue-snippet">Laid off from Meta after 6 years</div>
      </div>
      <div class="queue-when">Next week</div>
    </div>

    <div class="queue-item">
      <div class="queue-emoji">&#10084;&#65039;</div>
      <div class="queue-body">
        <div class="queue-author">Priya Nair</div>
        <div class="queue-snippet">Her grandmother's last recipe</div>
      </div>
      <div class="queue-when">Later this month</div>
    </div>
  </div>

  <div class="actions">
    <button class="btn-text">Start another session</button>
    <button class="btn-primary">Close LinkedIn</button>
  </div>
</div>

<script>
  // Count-up for stat numbers, fires after the stats reveal in.
  // Respects prefers-reduced-motion (skips animation, sets final value).
  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const easeOut = t => 1 - Math.pow(1 - t, 3);

  function countUp(el, target, duration = 600) {
    if (reduced) { el.textContent = target; return; }
    const start = performance.now();
    function tick(now) {
      const t = Math.min((now - start) / duration, 1);
      el.textContent = Math.round(easeOut(t) * target);
      if (t < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  // Fire each count-up aligned with its stat reveal.
  window.addEventListener('load', () => {
    const stats = document.querySelectorAll('.stat-num');
    stats.forEach((el, i) => {
      const target = parseInt(el.dataset.target, 10);
      const delay = 540 + i * 40; // matches the stat stagger
      setTimeout(() => countUp(el, target), delay);
    });
  });
</script>

</body>
</html>
