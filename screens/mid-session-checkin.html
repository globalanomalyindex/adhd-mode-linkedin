<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ADHD Mode · Check-in</title>
<style>
  @import url('../design-system/base.css');

  body { padding: 56px 24px; display: flex; justify-content: center; }
  .card {
    width: 100%; max-width: 440px; background: var(--card);
    border-radius: var(--r-md); box-shadow: var(--shadow);
    padding: var(--s-7) var(--s-6);
    text-align: center;
    opacity: 0; transform: translateY(var(--lift-md)) scale(0.96);
    animation: card-in var(--d-slow) var(--ease-out) 80ms forwards;
  }
  @keyframes card-in { to { opacity: 1; transform: none; } }

  /* Halfway marker: posts seen on the track, time read alongside. */
  .progress-ring { margin: 0 auto var(--s-5); width: 64px; height: 64px;
    position: relative; }
  .progress-ring svg { transform: rotate(-90deg); }
  .progress-ring .label { position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; color: var(--text);
    font-variant-numeric: tabular-nums; }

  h1 { font-size: 24px; font-weight: 600; line-height: var(--lh-tight); }
  .lede { font-size: var(--fs-small); color: var(--text-secondary);
    margin-top: var(--s-3); margin-bottom: var(--s-6); }

  /* Optional grounding moment (canon section 6). Skippable, never forced. */
  .grounding {
    background: var(--brand-tint); border-radius: var(--r-md);
    padding: var(--s-4); text-align: left;
    display: flex; gap: var(--s-3); align-items: flex-start;
    margin-bottom: var(--s-6);
  }
  .grounding-icon {
    width: 20px; height: 20px; flex-shrink: 0; color: var(--brand); margin-top: 1px;
  }
  .grounding-copy { flex: 1; }
  .grounding-tag {
    font-size: var(--fs-meta); font-weight: 600; color: var(--brand);
    letter-spacing: var(--tracking-wide); text-transform: uppercase;
  }
  .grounding-text { font-size: var(--fs-small); color: var(--text);
    line-height: var(--lh-base); margin-top: var(--s-1); }
  .grounding-skip {
    font-size: var(--fs-meta); color: var(--text-secondary); font-weight: 600;
    margin-top: var(--s-2); padding: 2px 0;
  }
  .grounding-skip:hover { color: var(--brand); }

  .actions { display: flex; flex-direction: column; gap: var(--s-2); }
  .btn-stack {
    width: 100%; padding: 12px 18px; border-radius: var(--r-pill);
    font-size: 14px; font-weight: 600;
    transition: all var(--d-fast) var(--ease-in-out);
  }
  .btn-stack.primary { background: var(--brand); color: #fff; }
  .btn-stack.primary:hover { background: var(--brand-hover); transform: translateY(-1px); }
  .btn-stack.secondary { background: transparent; border: 1.5px solid var(--hairline); color: var(--text); }
  .btn-stack.secondary:hover { border-color: var(--brand); color: var(--brand); }
  .btn-stack.tertiary { background: transparent; color: var(--text-secondary); }
  .btn-stack.tertiary:hover { color: var(--brand); }
</style>
</head>
<body>
  <div class="card">
    <div class="progress-ring">
      <svg width="64" height="64">
        <circle cx="32" cy="32" r="28" fill="none" stroke="var(--hairline)" stroke-width="3"/>
        <circle cx="32" cy="32" r="28" fill="none" stroke="var(--brand)" stroke-width="3"
          stroke-dasharray="175.93" stroke-dashoffset="87.96" stroke-linecap="round"/>
      </svg>
      <div class="label">6/15</div>
    </div>

    <h1>6 posts in. About 6 minutes left.</h1>
    <p class="lede">Halfway through. Keep going, wrap up, or pause for now.</p>

    <div class="grounding">
      <svg class="grounding-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"></path><circle cx="12" cy="12" r="3"></circle>
      </svg>
      <div class="grounding-copy">
        <div class="grounding-tag">Optional reset</div>
        <div class="grounding-text">Look up from the screen. Name five things you can see that are green.</div>
        <button class="grounding-skip">Skip</button>
      </div>
    </div>

    <div class="actions">
      <button class="btn-stack primary">Keep going</button>
      <button class="btn-stack secondary">Wrap up now</button>
      <button class="btn-stack tertiary">Pause and come back later</button>
    </div>
  </div>
</body>
</html>
