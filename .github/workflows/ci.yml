name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  verify:
    name: Code, content, and generated artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Unit, type, lint, HTML, link, and copy checks
        run: npm run ci

      - name: Test coverage
        run: npm run test:coverage

      - name: Rebuild tokens and visual assets
        run: |
          npm run tokens:build
          npm run render:assets

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install analytics dependencies
        run: pip install -r requirements.txt

      - name: Validate the synthetic analytics rehearsal
        env:
          MPLCONFIGDIR: /tmp/matplotlib
        run: |
          python -m py_compile analytics/event_schema.py analytics/generate_events.py analytics/capability_metrics.py
          python analytics/event_schema.py
          python analytics/generate_events.py
          python analytics/capability_metrics.py

      - name: Deterministic generated artifacts are current
        run: |
          # Raster rendering varies across libpng and font stacks. The build steps
          # above smoke-test those outputs; freshness is byte-checked for the
          # platform-stable text artifacts.
          git diff --exit-code -- \
            design-system/tokens.css \
            design-system/tokens.json \
            analytics/sample_events.jsonl

  browser:
    name: Chromium interaction and accessibility checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright and axe
        run: npm run test:e2e
