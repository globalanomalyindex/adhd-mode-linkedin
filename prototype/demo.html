<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>ADHD Mode · Interactive demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg:           #f4f2ee;
    --card:         #ffffff;
    --text:         rgba(0, 0, 0, 0.92);
    --text-2:       rgba(0, 0, 0, 0.6);
    --text-3:       rgba(0, 0, 0, 0.45);
    --hairline:     rgba(0, 0, 0, 0.06);
    --brand:        #0a66c2;
    --brand-tint:   rgba(10, 102, 194, 0.06);

    --paper:        #f4f2ee;
    --coral:        #c4523a;
    --coral-soft:   #e8b9ad;
    --ink:          #171717;
    --device-bg:    #0d0d0e;
    --device-rim:   #1f1f22;

    --ease-out:     cubic-bezier(0.16, 1, 0.3, 1);
    --ease-spring:  cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Source Sans 3', -apple-system, BlinkMacSystemFont, sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    touch-action: none;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
    background:
      radial-gradient(circle at 50% 100%, rgba(196, 82, 58, 0.06), transparent 55%),
      radial-gradient(circle at 0% 0%, rgba(10, 102, 194, 0.04), transparent 50%),
      var(--paper);
  }

  /* ============ Device frame ============ */
  .stage { display: flex; flex-direction: column; align-items: center; gap: 24px; }

  .device {
    width: 396px; height: 836px;
    background: var(--device-bg);
    border-radius: 52px;
    padding: 12px;
    box-shadow:
      0 0 0 2px var(--device-rim),
      0 40px 96px rgba(0, 0, 0, 0.22),
      0 12px 28px rgba(0, 0, 0, 0.12);
    position: relative;
    flex-shrink: 0;
  }
  .device::before {
    content: '';
    position: absolute;
    top: 18px; left: 50%; transform: translateX(-50%);
    width: 116px; height: 26px;
    background: #000;
    border-radius: 14px;
    z-index: 10;
  }
  .device-screen {
    width: 100%; height: 100%;
    background: var(--bg);
    border-radius: 40px;
    overflow: hidden;
    position: relative;
  }

  /* ============ Topbar ============ */
  .topbar {
    background: var(--card);
    padding: 56px 18px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--hairline);
    font-size: 13px;
  }
  .topbar-left { display: flex; align-items: center; gap: 8px; color: var(--text-2); }
  .topbar-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--brand);
    box-shadow: 0 0 0 0 rgba(10, 102, 194, 0.35);
    animation: pulse 2.4s var(--ease-out) infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(10, 102, 194, 0.35); }
    50%      { box-shadow: 0 0 0 5px rgba(10, 102, 194, 0); }
  }
  .topbar-label { color: var(--text); font-weight: 600; }
  .topbar-meta {
    color: var(--text-3);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    display: flex; gap: 14px;
    font-variant-numeric: tabular-nums;
  }

  /* ============ Auto-cycle progress (Stories-style) ============ */
  .cycle-bar {
    position: absolute;
    top: 102px; left: 28px; right: 28px;
    height: 3px;
    background: rgba(0, 0, 0, 0.08);
    border-radius: 999px;
    overflow: hidden;
    z-index: 3;
  }
  .cycle-bar-fill {
    position: absolute; top: 0; left: 0; bottom: 0;
    width: 0%;
    background: linear-gradient(to right, var(--brand), #4d8fd6);
    border-radius: 999px;
    transition: width 0.16s linear;
  }

  /* ============ Skip arc ============ */
  .skip-arc {
    position: absolute;
    top: 112px; left: 50%; transform: translateX(-50%);
    width: 180px; height: 26px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.05), transparent);
    border-radius: 0 0 220px 220px;
    pointer-events: none;
    transition:
      width 0.32s var(--ease-out),
      height 0.32s var(--ease-out),
      background 0.32s var(--ease-out),
      top 0.32s var(--ease-out);
    z-index: 1;
  }
  .skip-arc.armed {
    width: 340px;
    height: 130px;
    top: 102px;
    background: radial-gradient(ellipse at top, rgba(0,0,0,0.24), transparent 70%);
  }
  .skip-badge {
    position: absolute;
    top: 44px; left: 50%;
    transform: translateX(-50%) translateY(-8px);
    background: rgba(0, 0, 0, 0.7);
    color: #fff;
    font-size: 12px; font-weight: 600;
    padding: 5px 14px;
    border-radius: 14px;
    opacity: 0;
    transition: opacity 0.2s ease, transform 0.32s var(--ease-out);
    pointer-events: none;
    white-space: nowrap;
  }
  .skip-arc.armed .skip-badge { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ============ Card (shorter, soft horizontal rectangle) ============ */
  .card-stage {
    position: absolute;
    top: 130px; left: 18px; right: 18px;
    height: 330px;
    display: flex; align-items: stretch;
    z-index: 2;
  }

  .card {
    width: 100%;
    background: var(--card);
    border-radius: 18px;
    padding: 18px 20px 20px;
    box-shadow:
      0 1px 0 rgba(0,0,0,0.04),
      0 12px 32px rgba(0, 0, 0, 0.08);
    will-change: transform, opacity;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
    cursor: grab;
    position: relative;
    transform-origin: center 35%;
    display: flex; flex-direction: column;
  }
  .card.dragging { cursor: grabbing; }
  .card.idle-wobble { animation: idleWobble 4.5s var(--ease-out) infinite; }
  @keyframes idleWobble {
    0%, 88%, 100% { transform: translateY(0) rotate(0); }
    92%           { transform: translateY(-3px) rotate(-0.6deg); }
    96%           { transform: translateY(0) rotate(0.4deg); }
  }

  .card-author { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .card-avatar {
    width: 40px; height: 40px;
    border-radius: 999px;
    flex-shrink: 0;
  }
  .card-author-name { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.2; }
  .card-author-role { font-size: 12px; color: var(--text-2); margin-top: 2px; }

  .card-content {
    font-size: 14px; line-height: 1.55; color: var(--text);
    white-space: pre-wrap;
    flex: 1;
    overflow: hidden;
  }

  .card-tag {
    position: absolute;
    top: -10px; right: 18px;
    padding: 4px 10px;
    border-radius: 999px;
    background: var(--brand);
    color: #fff;
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.06em;
    opacity: 0;
    transform: translateY(-4px) scale(0.92);
    transition: opacity 0.2s ease, transform 0.32s var(--ease-out);
    box-shadow: 0 6px 16px rgba(10, 102, 194, 0.25);
    pointer-events: none;
    white-space: nowrap;
  }
  .card-tag.visible { opacity: 1; transform: translateY(0) scale(1); }

  /* ============ Comment chip ============ */
  .comment-chip {
    position: absolute;
    top: 478px;
    left: 18px; right: 18px;
    background: var(--card);
    border-radius: 14px;
    padding: 12px 14px;
    box-shadow:
      0 1px 0 rgba(0,0,0,0.04),
      0 6px 20px rgba(0, 0, 0, 0.05);
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: transform 0.2s var(--ease-out), box-shadow 0.2s var(--ease-out), background 0.2s var(--ease-out);
    z-index: 2;
  }
  .comment-chip:hover, .comment-chip:active {
    transform: translateY(-1px);
    box-shadow:
      0 1px 0 rgba(0,0,0,0.04),
      0 10px 28px rgba(0, 0, 0, 0.08);
    background: #fafafa;
  }
  .comment-chip:active { transform: translateY(0); }

  .comment-avatar {
    width: 30px; height: 30px;
    border-radius: 999px;
    flex-shrink: 0;
  }
  .comment-body {
    flex: 1;
    min-width: 0;
    display: flex; flex-direction: column;
    gap: 1px;
  }
  .comment-author {
    font-size: 12px; font-weight: 600; color: var(--text);
    line-height: 1.2;
  }
  .comment-text {
    font-size: 13px; color: var(--text-2);
    line-height: 1.35;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 1;
    -webkit-box-orient: vertical;
  }
  .comment-replies {
    font-size: 11px; color: var(--brand); font-weight: 600;
    display: flex; align-items: center; gap: 3px;
    flex-shrink: 0;
  }
  .comment-replies-arrow {
    transition: transform 0.2s var(--ease-out);
  }
  .comment-chip:hover .comment-replies-arrow { transform: translateX(2px); }

  /* ============ Floating reaction preview (during drag) ============ */
  .react-preview {
    position: absolute;
    bottom: 140px;
    left: 50%;
    transform: translateX(-50%) translateY(20px) scale(0.7);
    pointer-events: none;
    opacity: 0;
    transition:
      opacity 0.2s var(--ease-out),
      transform 0.32s var(--ease-spring);
    z-index: 5;
    display: flex; flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .react-preview.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0) scale(1);
  }
  .react-preview-emoji {
    font-size: 76px;
    line-height: 1;
    filter: drop-shadow(0 8px 18px rgba(0, 0, 0, 0.18));
    transition: transform 0.2s var(--ease-spring);
  }
  .react-preview-label {
    background: var(--ink);
    color: #fff;
    font-size: 12px; font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 999px;
    white-space: nowrap;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.18);
  }
  .react-preview-label.resurface {
    background: var(--coral);
  }
  .react-preview-label.resurface::after {
    content: ' · resurfaces';
    opacity: 0.7;
  }

  /* ============ Reaction tray ============ */
  .tray {
    position: absolute;
    left: 18px; right: 18px;
    bottom: 26px;
    background: var(--card);
    border-radius: 999px;
    padding: 10px 6px;
    display: flex;
    justify-content: space-around;
    align-items: center;
    box-shadow:
      0 1px 0 rgba(0,0,0,0.04),
      0 8px 22px rgba(0, 0, 0, 0.08);
    z-index: 2;
    transition: opacity 0.24s var(--ease-out);
  }
  .tray.dragging-react {
    opacity: 1;
  }
  .tray-icon {
    font-size: 22px;
    line-height: 1;
    padding: 8px;
    border-radius: 999px;
    transform-origin: center;
    transition:
      transform 0.18s var(--ease-spring),
      opacity 0.18s var(--ease-out),
      background 0.18s var(--ease-out);
    will-change: transform;
    cursor: pointer;
  }
  .tray.dragging-react .tray-icon { opacity: 0.25; }
  .tray.dragging-react .tray-icon.nearest {
    opacity: 1;
    background: var(--brand-tint);
  }

  /* ============ Comment thread sheet ============ */
  .sheet-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0);
    backdrop-filter: blur(0px);
    -webkit-backdrop-filter: blur(0px);
    pointer-events: none;
    transition: background 0.32s var(--ease-out), backdrop-filter 0.32s var(--ease-out);
    z-index: 20;
  }
  .sheet-backdrop.open {
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    pointer-events: auto;
  }

  .sheet {
    position: absolute;
    left: 12px; right: 12px;
    bottom: 12px;
    max-height: 78%;
    background: var(--card);
    border-radius: 26px;
    padding: 16px 18px 22px;
    box-shadow:
      0 20px 60px rgba(0, 0, 0, 0.32),
      0 0 0 1px rgba(0, 0, 0, 0.04);
    transform: translateY(110%);
    transition: transform 0.4s var(--ease-out);
    z-index: 21;
    display: flex; flex-direction: column;
  }
  .sheet.open { transform: translateY(0); }
  .sheet-handle {
    width: 36px; height: 4px;
    background: rgba(0, 0, 0, 0.18);
    border-radius: 999px;
    margin: 0 auto 14px;
  }
  .sheet-header {
    display: flex; align-items: center; justify-content: space-between;
    padding-bottom: 12px; border-bottom: 1px solid var(--hairline);
    margin-bottom: 12px;
  }
  .sheet-title {
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--text-3);
  }
  .sheet-close {
    background: rgba(0, 0, 0, 0.05);
    border: none;
    width: 28px; height: 28px;
    border-radius: 999px;
    cursor: pointer;
    color: var(--text-2);
    font-size: 14px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.18s ease;
  }
  .sheet-close:hover { background: rgba(0, 0, 0, 0.1); }

  .sheet-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

  .sheet-original {
    display: flex; gap: 12px;
    padding: 10px 4px;
  }
  .sheet-original-avatar {
    width: 36px; height: 36px;
    border-radius: 999px;
    flex-shrink: 0;
  }
  .sheet-original-body { flex: 1; }
  .sheet-original-author {
    font-size: 13px; font-weight: 600; color: var(--text);
  }
  .sheet-original-text {
    font-size: 14px; line-height: 1.5; color: var(--text);
    margin-top: 4px;
  }
  .sheet-original-meta {
    font-size: 11px; color: var(--text-3);
    margin-top: 6px;
    display: flex; gap: 12px;
  }

  .sheet-replies {
    padding-left: 18px;
    border-left: 2px solid var(--hairline);
    margin-left: 18px;
    margin-top: 4px;
    display: flex; flex-direction: column;
    gap: 14px;
  }
  .reply {
    display: flex; gap: 10px;
  }
  .reply-avatar {
    width: 26px; height: 26px;
    border-radius: 999px;
    flex-shrink: 0;
  }
  .reply-body { flex: 1; }
  .reply-author { font-size: 12px; font-weight: 600; color: var(--text); }
  .reply-text { font-size: 13px; line-height: 1.45; color: var(--text-2); margin-top: 2px; }
  .reply-meta { font-size: 10px; color: var(--text-3); margin-top: 4px; }

  /* ============ Footer hint ============ */
  .hint {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: rgba(0, 0, 0, 0.5);
    text-align: center;
    transition: opacity 0.3s ease;
  }
  .hint .hint-coral { color: var(--coral); font-weight: 500; }
  .hint .hint-arrow { display: inline-block; margin: 0 6px; transform: translateY(1px); }

  /* ============ Reset link ============ */
  .reset-btn {
    position: absolute;
    top: 14px; left: 14px;
    z-index: 30;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border: 1px solid rgba(0, 0, 0, 0.08);
    color: var(--ink);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.06em;
    padding: 6px 10px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .reset-btn:hover { background: var(--coral); color: #fff; border-color: var(--coral); }

  @media (prefers-reduced-motion: reduce) {
    .card.idle-wobble { animation: none; }
    .topbar-dot { animation: none; }
  }

  @media (max-width: 480px) {
    body { padding: 16px 8px; }
    .device { width: 90vw; max-width: 396px; height: auto; aspect-ratio: 396 / 836; }
  }
</style>
</head>
<body>

<button class="reset-btn" id="reset">↻ Restart</button>

<div class="stage">
  <div class="device">
    <div class="device-screen">

      <div class="topbar">
        <div class="topbar-left">
          <span class="topbar-dot"></span>
          <span class="topbar-label">Focus</span>
        </div>
        <div class="topbar-meta">
          <span id="meta-time">11:42</span>
          <span id="meta-count">1/4</span>
          <span id="meta-queue">↻ 0</span>
        </div>
      </div>

      <div class="cycle-bar"><div class="cycle-bar-fill" id="cycle-fill"></div></div>

      <div class="skip-arc" id="skip-arc">
        <div class="skip-badge">Moved on</div>
      </div>

      <div class="card-stage">
        <div class="card idle-wobble" id="card">
          <div class="card-tag" id="card-tag">LIKE</div>
          <div class="card-author">
            <div class="card-avatar" id="avatar"></div>
            <div>
              <div class="card-author-name" id="author-name">Maya Chen</div>
              <div class="card-author-role" id="author-role">VP Engineering at Stripe</div>
            </div>
          </div>
          <div class="card-content" id="content">Loading...</div>
        </div>
      </div>

      <div class="comment-chip" id="comment-chip">
        <div class="comment-avatar" id="comment-avatar"></div>
        <div class="comment-body">
          <div class="comment-author" id="comment-author">Jamie L.</div>
          <div class="comment-text" id="comment-text">This hits.</div>
        </div>
        <div class="comment-replies">
          <span id="comment-reply-count">2 replies</span>
          <span class="comment-replies-arrow">→</span>
        </div>
      </div>

      <div class="react-preview" id="react-preview">
        <div class="react-preview-emoji" id="react-preview-emoji">👍</div>
        <div class="react-preview-label" id="react-preview-label">LIKE</div>
      </div>

      <div class="tray" id="tray">
        <div class="tray-icon" data-r="like">👍</div>
        <div class="tray-icon" data-r="celebrate">🎉</div>
        <div class="tray-icon" data-r="support">🤝</div>
        <div class="tray-icon" data-r="love">❤️</div>
        <div class="tray-icon" data-r="insightful">💡</div>
        <div class="tray-icon" data-r="funny">😄</div>
      </div>

      <div class="sheet-backdrop" id="sheet-backdrop"></div>
      <div class="sheet" id="sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-header">
          <div class="sheet-title">Comment thread</div>
          <button class="sheet-close" id="sheet-close" aria-label="Close">✕</button>
        </div>
        <div class="sheet-content">
          <div class="sheet-original">
            <div class="sheet-original-avatar" id="sheet-orig-avatar"></div>
            <div class="sheet-original-body">
              <div class="sheet-original-author" id="sheet-orig-author">Jamie L.</div>
              <div class="sheet-original-text" id="sheet-orig-text">...</div>
              <div class="sheet-original-meta">
                <span id="sheet-orig-time">2h</span>
                <span>·</span>
                <span id="sheet-orig-likes">12 reactions</span>
              </div>
            </div>
          </div>
          <div class="sheet-replies" id="sheet-replies"></div>
        </div>
      </div>

    </div>
  </div>

  <div class="hint" id="hint">
    <span class="hint-arrow">↑</span> skip
    <span style="margin: 0 8px; opacity: 0.5;">·</span>
    <span class="hint-arrow">↓</span> drag to <span class="hint-coral">react</span>
    <span style="margin: 0 8px; opacity: 0.5;">·</span>
    tap the comment to expand
  </div>
</div>

<script>
  'use strict';

  // ============================================================
  // POSTS with comments + replies
  // ============================================================
  const POSTS = [
    {
      author: "Maya Chen",
      role: "VP Engineering at Stripe",
      avatar: ["#dbeafe", "#bfdbfe"],
      content: "I almost quit my job last year.\n\nWhat saved me was learning that my job isn't to remove ambiguity. It IS the job. Make decisions faster than feels comfortable. Tell people what you don't know. Give them a framework to move forward without you.",
      comment: {
        avatar: ["#fde68a", "#fcd34d"],
        author: "Jamie L.",
        role: "Director of Engineering",
        text: "This hits. I had the exact same parking-lot moment last fall. Saving this for the next time I forget.",
        time: "1h",
        likes: "12 reactions",
        replies: [
          { avatar: ["#dbeafe", "#bfdbfe"], author: "Maya Chen", text: "Thank you, Jamie. You're not alone.", time: "45m" },
          { avatar: ["#ddd6fe", "#c4b5fd"], author: "Tom Reeves", text: "I needed to read this today. Genuinely.", time: "30m" },
        ],
      },
    },
    {
      author: "James Park",
      role: "Former PM at Meta · #OpenToWork",
      avatar: ["#fecaca", "#fca5a5"],
      content: "Today I was part of the layoffs at Meta. After 6 years, I'm officially looking. If you have any leads in product roles at scale, I'd love to hear from you. Thank you to everyone who has already reached out.",
      comment: {
        avatar: ["#bbf7d0", "#86efac"],
        author: "Sarah K.",
        role: "VP Product at a startup you've heard of",
        text: "Sending strength. We have an opening that might fit. DMing you now.",
        time: "2h",
        likes: "47 reactions",
        replies: [

          { avatar: ["#fde68a", "#fcd34d"], author: "Lin Wei", text: "Same situation here. Solidarity.", time: "1h" },
          { avatar: ["#e5e7eb", "#d1d5db"], author: "+8 others", text: "are also reaching out", time: "" },
        ],
      },
    },
    {
      author: "Priya Nair",
      role: "Writer at The Atlantic",
      avatar: ["#fde68a", "#fcd34d"],
      content: "My grandmother's last recipe, before her hands forgot. I'm putting it on the internet so our family always has it.\n\nTake the rice. Wash it three times. Add cardamom, not too much. The trick is the slowness.",
      comment: {
        avatar: ["#ddd6fe", "#c4b5fd"],
        author: "Alex P.",
        role: "Photographer",
        text: "Crying at my desk. My grandmother had a similar one with saffron. I'd forgotten until just now.",
        time: "3h",
        likes: "204 reactions",
        replies: [
          { avatar: ["#fde68a", "#fcd34d"], author: "Priya Nair", text: "Saffron is the soul of it. ❤", time: "2h" },
        ],
      },
    },
    {
      author: "Sara Kim",
      role: "Senior Designer at Figma",
      avatar: ["#ddd6fe", "#c4b5fd"],
      content: "Three things I've learned about hiring senior designers, after running 60+ portfolio reviews this year:\n\n1. Show the rejected options.\n2. Name your trade-offs out loud.\n3. Stop apologizing for incomplete work.",
      comment: {
        avatar: ["#bbf7d0", "#86efac"],
        author: "David Chu",
        role: "Director at Adobe",
        text: "This is the most useful thing I've read about design hiring this year. Saving for our whole team.",
        time: "5h",
        likes: "89 reactions",
        replies: [
          { avatar: ["#ddd6fe", "#c4b5fd"], author: "Sara Kim", text: "Means a lot from you, David.", time: "4h" },
          { avatar: ["#fde68a", "#fcd34d"], author: "Hana Suzuki", text: "+1, sharing internally.", time: "3h" },
        ],
      },
    },
  ];

  const REACTION_NAMES = {
    like: 'LIKE',
    celebrate: 'CELEBRATE',
    support: 'SUPPORT',
    love: 'LOVE',
    insightful: 'INSIGHTFUL',
    funny: 'FUNNY',
  };
  const REACTION_EMOJI = {
    like: '👍', celebrate: '🎉', support: '🤝',
    love: '❤️', insightful: '💡', funny: '😄',
  };
  const RESURFACE = new Set(['insightful', 'support', 'love']);

  // ============================================================
  // ELEMENTS
  // ============================================================
  const $ = sel => document.querySelector(sel);
  const $$ = sel => Array.from(document.querySelectorAll(sel));

  const card = $('#card');
  const cardTag = $('#card-tag');
  const tray = $('#tray');
  const trayIcons = $$('.tray-icon');
  const skipArc = $('#skip-arc');
  const hint = $('#hint');
  const resetBtn = $('#reset');

  const elAuthor = $('#author-name');
  const elRole = $('#author-role');
  const elAvatar = $('#avatar');
  const elContent = $('#content');
  const metaCount = $('#meta-count');
  const metaQueue = $('#meta-queue');

  // Comment chip
  const chip = $('#comment-chip');
  const chipAvatar = $('#comment-avatar');
  const chipAuthor = $('#comment-author');
  const chipText = $('#comment-text');
  const chipReplyCount = $('#comment-reply-count');

  // Comment sheet
  const sheet = $('#sheet');
  const sheetBackdrop = $('#sheet-backdrop');
  const sheetClose = $('#sheet-close');
  const sheetOrigAvatar = $('#sheet-orig-avatar');
  const sheetOrigAuthor = $('#sheet-orig-author');
  const sheetOrigText = $('#sheet-orig-text');
  const sheetOrigTime = $('#sheet-orig-time');
  const sheetOrigLikes = $('#sheet-orig-likes');
  const sheetReplies = $('#sheet-replies');

  // Reaction preview
  const reactPreview = $('#react-preview');
  const reactPreviewEmoji = $('#react-preview-emoji');
  const reactPreviewLabel = $('#react-preview-label');

  // Auto-cycle
  const cycleFill = $('#cycle-fill');

  // Cycle parameters
  const CYCLE_MS = 10000;

  // ============================================================
  // STATE
  // ============================================================
  let postIdx = 0;
  let queueCount = 0;
  let dragging = false;
  let dragStart = null;
  let samples = [];
  let pos = { x: 0, y: 0 };
  let committing = false;
  let sheetOpen = false;

  // Auto-cycle state
  let cycleStart = 0;
  let cyclePaused = 0;       // when paused, total ms paused
  let cyclePauseTime = null; // when pause started, or null
  let cycleRAF = null;

  class Spring {
    constructor(value, stiffness = 220, damping = 22) {
      this.value = value;
      this.target = value;
      this.velocity = 0;
      this.stiffness = stiffness;
      this.damping = damping;
    }
    set(v) { this.value = v; this.velocity = 0; this.target = v; }
    setValue(v) { this.value = v; }
    setVelocity(v) { this.velocity = v; }
    setTarget(t) { this.target = t; }
    step(dt) {
      const force = -this.stiffness * (this.value - this.target);
      const damp = -this.damping * this.velocity;
      this.velocity += (force + damp) * dt;
      this.value += this.velocity * dt;
    }
  }

  const sX = new Spring(0, 260, 24);
  const sY = new Spring(0, 260, 24);
  const sRot = new Spring(0, 220, 18);
  const sScale = new Spring(1, 280, 22);
  const sOpacity = new Spring(1, 200, 24);

  // ============================================================
  // RENDER
  // ============================================================
  function renderPost(idx) {
    const p = POSTS[idx];
    elAuthor.textContent = p.author;
    elRole.textContent = p.role;
    elAvatar.style.background = `linear-gradient(135deg, ${p.avatar[0]}, ${p.avatar[1]})`;
    elContent.textContent = p.content;

    // Comment chip
    chipAvatar.style.background = `linear-gradient(135deg, ${p.comment.avatar[0]}, ${p.comment.avatar[1]})`;
    chipAuthor.textContent = p.comment.author;
    chipText.textContent = p.comment.text;
    const replyN = p.comment.replies.length;
    chipReplyCount.textContent = replyN === 1 ? '1 reply' : `${replyN} replies`;
  }

  function updateMeta() {
    metaCount.textContent = `${postIdx + 1}/${POSTS.length}`;
    metaQueue.textContent = `↻ ${queueCount}`;
  }

  renderPost(0);
  updateMeta();

  // ============================================================
  // SPRING RENDER LOOP
  // ============================================================
  let lastT = performance.now();
  function frame(now) {
    const dt = Math.min((now - lastT) / 1000, 0.05);
    lastT = now;

    if (!dragging) { sX.step(dt); sY.step(dt); }
    sRot.step(dt);
    sScale.step(dt);
    sOpacity.step(dt);

    card.style.transform =
      `translate(${sX.value.toFixed(2)}px, ${sY.value.toFixed(2)}px) ` +
      `rotate(${sRot.value.toFixed(2)}deg) ` +
      `scale(${sScale.value.toFixed(3)})`;
    card.style.opacity = sOpacity.value.toFixed(3);

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // ============================================================
  // AUTO-CYCLE
  // ============================================================
  function startCycle() {
    cycleStart = performance.now();
    cyclePaused = 0;
    cyclePauseTime = null;
    if (cycleRAF) cancelAnimationFrame(cycleRAF);
    tickCycle();
  }
  function pauseCycle() {
    if (cyclePauseTime !== null) return; // already paused
    cyclePauseTime = performance.now();
  }
  function resumeCycle() {
    if (cyclePauseTime === null) return;
    cyclePaused += performance.now() - cyclePauseTime;
    cyclePauseTime = null;
  }
  function tickCycle() {
    if (committing || sheetOpen) {
      cycleRAF = requestAnimationFrame(tickCycle);
      return;
    }
    const now = performance.now();
    const effective = cyclePauseTime !== null ? cyclePauseTime : now;
    const elapsed = effective - cycleStart - cyclePaused;
    const pct = Math.min(elapsed / CYCLE_MS, 1);
    cycleFill.style.width = (pct * 100).toFixed(2) + '%';
    if (pct >= 1) {
      autoAdvance();
      return;
    }
    cycleRAF = requestAnimationFrame(tickCycle);
  }
  function autoAdvance() {
    committing = true;
    // Soft fade-up exit (gentler than a manual skip)
    sY.setVelocity(-300);
    sY.setTarget(-280);
    sOpacity.setTarget(0);
    setTimeout(nextPost, 320);
  }

  // ============================================================
  // VELOCITY TRACKER
  // ============================================================
  function pushSample(x, y, t) {
    samples.push({ x, y, t });
    while (samples.length > 6) samples.shift();
  }
  function currentVelocity() {
    if (samples.length < 2) return { vx: 0, vy: 0 };
    const a = samples[0], b = samples[samples.length - 1];
    const dt = Math.max(1, b.t - a.t);
    return { vx: (b.x - a.x) / dt, vy: (b.y - a.y) / dt };
  }

  // ============================================================
  // GESTURE CLASSIFICATION  +  FEEDBACK
  // ============================================================
  const COMMIT_DIST = 90;
  const COMMIT_VEL = 0.7;

  function nearestReactionForX(absX) {
    let best = trayIcons[0], bestD = Infinity;
    for (const el of trayIcons) {
      const r = el.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const d = Math.abs(absX - cx);
      if (d < bestD) { bestD = d; best = el; }
    }
    return best;
  }

  function updateDestinationFeedback(dx, dy, clientX) {
    if (dy < -10 && Math.abs(dy) > Math.abs(dx) * 0.6) {
      // SKIP zone
      const progress = Math.min(Math.abs(dy) / COMMIT_DIST, 1);
      if (progress > 0.6) skipArc.classList.add('armed');
      else skipArc.classList.remove('armed');
      tray.classList.remove('dragging-react');
      for (const el of trayIcons) {
        el.style.transform = `scale(${1 - 0.06 * progress})`;
        el.classList.remove('nearest');
      }
      cardTag.classList.remove('visible');
      reactPreview.classList.remove('visible');
    } else if (dy > 10) {
      // REACT zone
      skipArc.classList.remove('armed');
      tray.classList.add('dragging-react');

      const nearest = nearestReactionForX(clientX);
      const nearestR = nearest.dataset.r;
      const radius = 100;

      for (const el of trayIcons) {
        const r = el.getBoundingClientRect();
        const cx = r.left + r.width / 2;
        const d = Math.abs(clientX - cx);
        const t = Math.max(0, 1 - d / radius);
        const eased = 1 - Math.pow(1 - t, 2);
        if (el === nearest) {
          const scale = 1 + 1.5 * eased; // peak 2.5x
          el.style.transform = `scale(${scale.toFixed(3)}) translateY(${(-14 * eased).toFixed(2)}px)`;
          el.classList.add('nearest');
        } else {
          const scale = 0.85 + 0.05 * eased;
          el.style.transform = `scale(${scale.toFixed(3)})`;
          el.classList.remove('nearest');
        }
      }

      // Floating preview
      cardTag.classList.remove('visible');
      reactPreview.classList.add('visible');
      if (reactPreviewEmoji.textContent !== REACTION_EMOJI[nearestR]) {
        reactPreviewEmoji.textContent = REACTION_EMOJI[nearestR];
        // tiny pop when reaction changes
        reactPreviewEmoji.style.transform = 'scale(0.86)';
        requestAnimationFrame(() => requestAnimationFrame(() => {
          reactPreviewEmoji.style.transform = 'scale(1)';
        }));
      }
      reactPreviewLabel.textContent = REACTION_NAMES[nearestR];
      reactPreviewLabel.classList.toggle('resurface', RESURFACE.has(nearestR));
    } else {
      // idle
      skipArc.classList.remove('armed');
      tray.classList.remove('dragging-react');
      for (const el of trayIcons) {
        el.style.transform = '';
        el.classList.remove('nearest');
      }
      cardTag.classList.remove('visible');
      reactPreview.classList.remove('visible');
    }
  }

  function clearFeedback() {
    skipArc.classList.remove('armed');
    tray.classList.remove('dragging-react');
    for (const el of trayIcons) {
      el.style.transform = '';
      el.classList.remove('nearest');
    }
    cardTag.classList.remove('visible');
    reactPreview.classList.remove('visible');
  }

  // ============================================================
  // INTERACTION
  // ============================================================
  function onPointerDown(e) {
    if (committing || sheetOpen) return;
    dragging = true;
    card.classList.add('dragging');
    card.classList.remove('idle-wobble');
    hint.style.opacity = '0.3';
    pauseCycle();
    try { card.setPointerCapture(e.pointerId); } catch {}
    dragStart = { x: e.clientX, y: e.clientY };
    samples.length = 0;
    pushSample(e.clientX, e.clientY, performance.now());
    sX.setVelocity(0); sY.setVelocity(0);
    e.preventDefault();
  }

  function onPointerMove(e) {
    if (!dragging) return;
    const dx = e.clientX - dragStart.x;
    const dy = e.clientY - dragStart.y;
    pushSample(e.clientX, e.clientY, performance.now());

    sX.setValue(dx);
    sY.setValue(dy);

    const vel = currentVelocity();
    const rotFromPos = clamp(dx * 0.06, -10, 10);
    const rotFromVel = clamp(vel.vx * 6, -3.5, 3.5);
    sRot.setTarget(rotFromPos + rotFromVel);

    const speed = Math.hypot(vel.vx, vel.vy);
    const scaleTarget = 1 - clamp(speed * 0.06, 0, 0.04);
    sScale.setTarget(scaleTarget);

    pos = { x: dx, y: dy };
    updateDestinationFeedback(dx, dy, e.clientX);
    e.preventDefault();
  }

  function onPointerUp(e) {
    if (!dragging) return;
    dragging = false;
    card.classList.remove('dragging');
    hint.style.opacity = '';

    const vel = currentVelocity();
    const dx = pos.x, dy = pos.y;

    const upCommit   = (dy < -COMMIT_DIST) || (vel.vy < -COMMIT_VEL);
    const downCommit = (dy > COMMIT_DIST)  || (vel.vy > COMMIT_VEL);

    if (upCommit) {
      commitSkip(vel);
    } else if (downCommit) {
      const nearest = nearestReactionForX(e.clientX);
      commitReaction(nearest.dataset.r, vel);
    } else {
      sX.setVelocity(vel.vx * 1000);
      sY.setVelocity(vel.vy * 1000);
      sX.setTarget(0); sY.setTarget(0);
      sRot.setTarget(0); sScale.setTarget(1);
      clearFeedback();
      resumeCycle();
      setTimeout(() => { if (!dragging) card.classList.add('idle-wobble'); }, 1200);
    }
  }

  function commitSkip(vel) {
    committing = true;
    clearFeedback();
    sY.setVelocity(Math.min(vel.vy * 1000, -1400));
    sY.setTarget(-900);
    sRot.setTarget(sRot.value + (Math.random() > 0.5 ? -4 : 4));
    sOpacity.setTarget(0);
    setTimeout(nextPost, 320);
  }

  function commitReaction(reaction, vel) {
    committing = true;
    clearFeedback();
    if (RESURFACE.has(reaction)) {
      queueCount += 1;
      updateMeta();
    }
    sScale.setTarget(1.04);
    setTimeout(() => sScale.setTarget(1), 110);
    sY.setVelocity(Math.max(vel.vy * 1000, 1400));
    sY.setTarget(900);
    sOpacity.setTarget(0);
    setTimeout(nextPost, 320);
  }

  function nextPost() {
    postIdx = (postIdx + 1) % POSTS.length;
    renderPost(postIdx);
    updateMeta();
    sX.set(0);
    sY.set(40);
    sRot.set(0);
    sScale.set(0.96);
    sOpacity.set(0);
    requestAnimationFrame(() => {
      sY.setTarget(0);
      sScale.setTarget(1);
      sOpacity.setTarget(1);
    });
    committing = false;
    pos = { x: 0, y: 0 };
    setTimeout(() => { if (!dragging) card.classList.add('idle-wobble'); }, 1600);
    startCycle();
  }

  card.addEventListener('pointerdown', onPointerDown);
  card.addEventListener('pointermove', onPointerMove);
  card.addEventListener('pointerup', onPointerUp);
  card.addEventListener('pointercancel', onPointerUp);

  // Tray tap fallback
  for (const el of trayIcons) {
    el.addEventListener('click', () => {
      if (committing || dragging || sheetOpen) return;
      commitReaction(el.dataset.r, { vx: 0, vy: 1.6 });
    });
  }

  // ============================================================
  // COMMENT SHEET
  // ============================================================
  chip.addEventListener('click', openSheet);

  function openSheet() {
    if (sheetOpen) return;
    sheetOpen = true;
    pauseCycle();
    const p = POSTS[postIdx];
    const c = p.comment;

    sheetOrigAvatar.style.background = `linear-gradient(135deg, ${c.avatar[0]}, ${c.avatar[1]})`;
    sheetOrigAuthor.textContent = c.author;
    sheetOrigText.textContent = c.text;
    sheetOrigTime.textContent = c.time;
    sheetOrigLikes.textContent = c.likes;

    sheetReplies.innerHTML = '';
    for (const r of c.replies) {
      const div = document.createElement('div');
      div.className = 'reply';
      const av = document.createElement('div');
      av.className = 'reply-avatar';
      av.style.background = `linear-gradient(135deg, ${r.avatar[0]}, ${r.avatar[1]})`;
      const body = document.createElement('div');
      body.className = 'reply-body';
      const au = document.createElement('div');
      au.className = 'reply-author';
      au.textContent = r.author;
      const tx = document.createElement('div');
      tx.className = 'reply-text';
      tx.textContent = r.text;
      const mt = document.createElement('div');
      mt.className = 'reply-meta';
      mt.textContent = r.time;
      body.appendChild(au); body.appendChild(tx);
      if (r.time) body.appendChild(mt);
      div.appendChild(av); div.appendChild(body);
      sheetReplies.appendChild(div);
    }

    sheet.classList.add('open');
    sheetBackdrop.classList.add('open');
  }

  function closeSheet() {
    if (!sheetOpen) return;
    sheetOpen = false;
    sheet.classList.remove('open');
    sheetBackdrop.classList.remove('open');
    resumeCycle();
  }

  sheetClose.addEventListener('click', closeSheet);
  sheetBackdrop.addEventListener('click', closeSheet);

  resetBtn.addEventListener('click', () => {
    closeSheet();
    postIdx = -1;
    queueCount = 0;
    nextPost();
  });

  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  // Kick off the first cycle
  startCycle();
</script>
</body>
